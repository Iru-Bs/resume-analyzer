<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body { background: #667eea; text-align:center; }
        .box { background:white; padding:30px; width:300px; margin:100px auto; }
    </style>
</head>
<body>

<div class="box">
    <h2>Register</h2>
    <form method="POST">
        <input name="username" placeholder="Username"><br><br>
        <input type="password" name="password" placeholder="Password"><br><br>
        <button type="submit">Register</button>
    </form>
    <br>
    <a href="/">Already have account? Login</a>
</div>

</body>
</html>
